# About: Project configuration. House schema (KPI definitions, aliases, source
# priority) plus pipeline knobs. Loaded by src/ontology/schema_loader.py.
# This is the single source of truth for what the populated model expects.

project:
  name: ai-financial-model
  version: 0.1.0

paths:
  inbox: ./inbox
  output: ./output
  data: ./data
  templates: ./templates

pipeline:
  # Wall-clock budget for the full pipeline on a single deal (seconds).
  max_runtime_seconds: 300
  # Confidence score floor; cells below this are left empty with a reason code.
  min_confidence: 0.6

reconciliation:
  # Default cross-source variance tolerance. Override per-KPI below.
  default_tolerance_pct: 0.5

models:
  llm:
    provider: anthropic
    model: claude-sonnet-4-6
    # Long-context extraction agents use Opus for full-table prompts.
    long_context_model: claude-opus-4-7
  embeddings:
    model: bge-base-en-v1.5
  reranker:
    model: bge-reranker-base

house_schema:
  segments:
    - id: total_company
      label: Total Company

  kpis:
    - id: revenue_total
      label: Total Revenue
      units: USD_millions
      aliases: [net revenue, total revenues, sales, net sales]
      required: true
      sources_priority: [audited_financials, cim, mgmt_deck]
      tolerance_pct: 0.5

    - id: adj_ebitda
      label: Adjusted EBITDA
      units: USD_millions
      aliases: [adjusted EBITDA, normalized EBITDA, run-rate EBITDA, pro forma EBITDA]
      required: true
      sources_priority: [audited_financials, cim]
      tolerance_pct: 0.5
      notes: Capture both as-reported and adjusted; flag if reconciliation bridge missing.

    - id: gross_profit
      label: Gross Profit
      units: USD_millions
      aliases: [gross margin dollars]
      required: true
      sources_priority: [audited_financials, cim]
      tolerance_pct: 0.5

    - id: capex_total
      label: Capital Expenditures
      units: USD_millions
      aliases: [capex, capital expenditures, purchases of PP&E]
      required: false
      sources_priority: [audited_financials, cim]
      tolerance_pct: 1.0

    - id: working_capital
      label: Net Working Capital
      units: USD_millions
      aliases: [NWC, net working capital]
      required: false
      sources_priority: [audited_financials]
      tolerance_pct: 2.0
